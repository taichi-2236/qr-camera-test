<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カメラ ＆ GAS送信テスト</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f5f5f7; padding: 20px; margin: 0; }
        button { padding: 12px 24px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px; background: #0071e3; color: white; cursor: pointer; margin: 5px; }
        button:active { background: #005bb5; }
        #video-container { position: relative; max-width: 500px; margin: 20px auto; border-radius: 12px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; height: 60%; border: 3px dashed #00ff00; opacity: 0.5; pointer-events: none; }
        #status { font-weight: bold; color: #86868b; }
        .test-input-area { margin-top: 20px; padding: 15px; background: #fff; border-radius: 8px; max-width: 500px; margin-left: auto; margin-right: auto; }
        input { padding: 10px; width: 60%; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>カメラ ＆ GAS送信テスト</h1>
    
    <div>
        <button id="btn-start">カメラを起動</button>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-frame"></div>
    </div>

    <p id="status">カメラ未起動</p>

    <div class="test-input-area">
        <h3>GAS送信テスト</h3>
        <p style="font-size:0.85rem; color:#666;">（QRコードが読み取れたと仮定して、文字をスプレッドシートに送るテスト）</p>
        <input type="text" id="test-data" value="テストデータ123">
        <button id="btn-send">GASへ送信</button>
    </div>

    <script>
        // ★ここに先ほどコピーしたGASの「ウェブアプリのURL」を貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/XXXXX/exec";

        const video = document.getElementById('video');
        const btnStart = document.getElementById('btn-start');
        const btnSend = document.getElementById('btn-send');
        const statusText = document.getElementById('status');
        const testDataInput = document.getElementById('test-data');

        // 1. カメラ起動処理（GitHub Pages上なら100%動きます）
        btnStart.addEventListener('click', async () => {
            const constraints = {
                video: { facingMode: { ideal: "environment" } },
                audio: false
            };
            try {
                statusText.innerText = "カメラ起動中...";
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                statusText.innerText = "カメラ起動成功！";
                statusText.style.color = "#34c759";
            } catch (err) {
                statusText.innerText = "カメラエラー: " + err.name;
                statusText.style.color = "#ff3b30";
                console.error(err);
            }
        });

        // 2. GAS（API）へのデータ送信処理
        btnSend.addEventListener('click', async () => {
            const textToSend = testDataInput.value;
            if (!textToSend) return alert("文字を入力してください");

            statusText.innerText = "GASへ送信中...";
            statusText.style.color = "#0071e3";

            try {
                // Fetch APIを使ってGASに非同期でPOSTリクエストを送る
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors", // GASのCORS制限を回避するための設定
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text: textToSend })
                });

                // ※ mode: "no-cors" の場合、レスポンスの中身はブラウザの制限で読めませんが、
                // リクエスト自体は正常にGASに届き、スプレッドシートに書き込まれます。
                statusText.innerText = "送信処理完了！（スプレッドシートを確認してください）";
                statusText.style.color = "#34c759";

            } catch (err) {
                statusText.innerText = "送信エラー: " + err.message;
                statusText.style.color = "#ff3b30";
                console.error(err);
            }
        });
    </script>
</body>
</html>
